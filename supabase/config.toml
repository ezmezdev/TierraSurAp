project_id = "TU_PROJECT_ID"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://tu-dominio.com"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = false

[edge_runtime]
enabled = true

[functions.crear-anuncio]
verify_jwt = false  # Verificamos el JWT manualmente en la función

[functions.crear-preferencia-mp]
verify_jwt = false

[functions.webhook-mp]
verify_jwt = false  # Viene de nuestro servidor, no de usuarios

[functions.activar-anuncio]
verify_jwt = false  # Solo llamada interna

[functions.expirar-anuncios]
verify_jwt = false  # Cron job del sistema

# ============================================================
# CRON JOBS
# Configurar en Supabase Dashboard > Database > pg_cron
# O via SQL:
#
# SELECT cron.schedule(
#   'expirar-anuncios-diario',
#   '0 6 * * *',
#   $$
#     SELECT net.http_post(
#       url := 'https://TU_PROJECT_ID.supabase.co/functions/v1/expirar-anuncios',
#       headers := '{"Authorization": "Bearer TU_SERVICE_ROLE_KEY"}'::jsonb
#     );
#   $$
# );
# ============================================================
